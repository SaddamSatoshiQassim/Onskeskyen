<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ønskeskyen</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<header>
    <div class="top-bar">
        <h1>Ønskeskyen</h1>
    </div>
</header>

<nav class="main-nav">
    <div class="nav-left">
        <a th:href="@{/om-os}">Om os</a>
        <a th:href="@{/kontakt}">Kontakt</a>

        <a th:if="${session.brugerId != null}" th:href="@{/profil}">
            Profil
        </a>
    </div>

    <div class="nav-right">
        <!-- IKKE LOGGET IND -->
        <a th:if="${session.brugerId == null}" th:href="@{/login}" class="login-btn">
            Login
        </a>

        <!-- LOGGET IND -->
        <form th:if="${session.brugerId != null}" th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="nav-link-btn">Log ud</button>
        </form>
    </div>
</nav>

<main>
    <section class="box">
        <h2>Mine ønsker</h2>
        <p>Her kan brugeren hurtigt få overblik over sine ønsker.</p>
    </section>

    <section class="box">
        <h2>Opret nyt ønske</h2>
        <p>En enkel boks hvor man nemt kan tilføje nye ønsker.</p>
    </section>

    <section class="box">
        <h2>Populære ønsker</h2>
        <p>Viser udvalgte eller ofte brugte ønsker på en enkel måde.</p>
    </section>
</main>

<footer>
    <p>&copy; 2026 Ønskeskyen</p>
</footer>

</body>
</html>
