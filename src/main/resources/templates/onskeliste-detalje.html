<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ønskeliste</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>

<header class="site-header">
    <div class="container header-content">
        <h1>Ønskeliste</h1>
        <p class="subtitle">Hold styr på ønsker og reservationer</p>
    </div>
</header>

<nav class="main-nav">
    <div class="container nav-content">
        <div class="nav-left">
            <a href="/" class="nav-link">Forside</a>
            <a href="/onskelister" class="nav-link">Tilbage</a>
        </div>

        <div class="nav-right">
            <form action="/logout" method="post" class="logout-form">
                <button type="submit" class="nav-button secondary">Log ud</button>
            </form>
        </div>
    </div>
</nav>

<main class="container main-grid">

    <section class="card">
        <div class="card-header">
            <h2>Tilføj ønske</h2>
        </div>

        <form class="wish-form"
              th:action="@{/onskelister/{id}/tilfoej-onske(id=${onskelisteId})}"
              method="post">

            <div class="form-group">
                <label for="navn">Navn</label>
                <input id="navn" type="text" name="navn" placeholder="F.eks. Trådløse høretelefoner" required>
            </div>

            <div class="form-group">
                <label for="link">Produktlink</label>
                <input id="link" type="text" name="link" placeholder="https://...">
            </div>

            <div class="form-group">
                <label for="pris">Pris</label>
                <input id="pris" type="number" step="0.01" name="pris" placeholder="299.95">
            </div>

            <div class="form-group">
                <label for="billede">Billede link</label>
                <input id="billede" type="text" name="billede" placeholder="https://...">
            </div>

            <button type="submit" class="nav-button primary">Tilføj ønske</button>
        </form>
    </section>

    <section class="card">
        <div class="card-header">
            <h2>Ønsker</h2>
        </div>

        <p class="empty-message" th:if="${#lists.isEmpty(onsker)}">
            Der er ingen ønsker endnu.
        </p>

        <ul class="wish-list">
            <li th:each="onske : ${onsker}"
                th:classappend="${onske.booket} ? 'booked' : 'available'"
                class="wish-item">

                <div class="wish-info">
                    <div class="wish-top">
                        <span class="wish-title" th:text="${onske.navn}">Navn</span>

                        <span th:if="${!onske.booket}" class="status status-free">Ledig</span>
                        <span th:if="${onske.booket}" class="status status-booked">Booket</span>
                    </div>

                    <div class="wish-meta">
                        Pris: <span th:text="${onske.pris}">0</span> kr.
                    </div>

                    <div class="wish-meta">
                        <a th:href="${onske.link}" target="_blank" rel="noopener noreferrer">Se produkt</a>
                    </div>
                </div>

                <form th:action="@{/onskelister/{id}/slet-onske(id=${onskelisteId})}" method="post">
                    <input type="hidden" name="onskeId" th:value="${onske.onskeId}">
                    <button type="submit" class="nav-button danger">Slet</button>
                </form>
            </li>
        </ul>
    </section>

</main>

<footer class="site-footer">
    <div class="container">
        <p>&copy; 2026 Ønskeskyen</p>
    </div>
</footer>

</body>
</html>
